name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  backend:
    name: Backend (lint, typecheck, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate

      - name: Validar schema de Prisma
        run: npx prisma validate

      - name: Lint
        run: npm run lint:check

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.build.json

      - name: Tests unitarios
        run: npm test -- --ci

      - name: Build
        run: npm run build

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Build
        env:
          BACKEND_URL: "http://localhost:3001"
        run: npm run build

  docker-build:
    name: Validar que ambas imagenes Docker construyen
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: false
          tags: rave-backend:ci

      - name: Build imagen frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: false
          tags: rave-frontend:ci
